<!DOCTYPE html>
<html>
<head>
  <title>Otel AI Revenue Agent</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f7fb;
      margin: 0;
      padding: 40px;
    }
    .box {
      max-width: 850px;
      margin: auto;
      background: white;
      padding: 28px;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    }
    h1 { margin-top: 0; }
    textarea {
      width: 100%;
      height: 90px;
      padding: 12px;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #ddd;
    }
    button {
      margin-top: 12px;
      padding: 12px 18px;
      border: 0;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 15px;
      cursor: pointer;
    }
    #answer {
      margin-top: 20px;
      white-space: pre-wrap;
      background: #f3f4f6;
      padding: 16px;
      border-radius: 12px;
      line-height: 1.5;
    }
    input {
      padding: 10px;
      margin: 4px 0;
      width: 240px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>🏨 Otel AI Revenue Agent</h1>
    <p>Ask revenue questions about OTB, pickup, segment mix, OTA dependency, and block vs transient mix.</p>

    <div>
      <input id="user" placeholder="Username" value="admin" />
      <input id="pass" placeholder="Password" type="password" />
    </div>

    <textarea id="question">What is July 2026 OTB?</textarea>
    <br />
    <button onclick="ask()">Ask Agent</button>

    <div id="answer">Answer will appear here.</div>
  </div>

  <script>
    async function ask() {
      const question = document.getElementById("question").value;
      const user = document.getElementById("user").value;
      const pass = document.getElementById("pass").value;
      const answerBox = document.getElementById("answer");

      answerBox.textContent = "Thinking...";

      const res = await fetch("/api/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Basic " + btoa(user + ":" + pass)
        },
        body: JSON.stringify({ question })
      });

      const data = await res.json();
      answerBox.textContent = data.answer || JSON.stringify(data, null, 2);
    }
  </script>
</body>
</html>
